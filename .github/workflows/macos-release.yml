name: Build macOS Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS package
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload macOS release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: quicksend-v__VERSION__
          releaseName: QuickSend v__VERSION__
          releaseBody: "Unsigned macOS build for QuickSend. macOS may show a Gatekeeper warning until Apple signing and notarization are configured."
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin
